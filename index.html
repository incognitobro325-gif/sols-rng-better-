<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SOL'S RNG: ETERNAL EDITION</title>
    <style>
        :root { --aura-color: #fff; }
        body { 
            background: #000; color: white; font-family: 'Segoe UI', sans-serif; 
            margin: 0; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* VFX CANVAS */
        #vfx-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        /* CUTSCENE */
        #cutscene {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 100; display: none;
            flex-direction: column; justify-content: center; align-items: center;
        }
        #cutscene-flash { position: absolute; width: 100%; height: 100%; background: white; opacity: 0; z-index: 101; }
        #cutscene-name { 
            font-size: 8rem; font-weight: 900; text-transform: uppercase; 
            z-index: 102; opacity: 0; filter: drop-shadow(0 0 20px var(--aura-color));
        }

        /* UI */
        #viewport { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }
        #aura-name { 
            font-size: 6rem; font-weight: 900; text-transform: uppercase; 
            color: var(--aura-color); text-shadow: 0 0 30px var(--aura-color); 
            transition: 0.5s; letter-spacing: 5px;
        }
        #aura-rarity { font-size: 1.5rem; opacity: 0.6; margin-top: 10px; font-weight: 300; }
        
        .top-stats { position: absolute; top: 20px; left: 20px; font-family: monospace; font-size: 1.2rem; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; border: 1px solid #333; }
        
        #inventory {
            position: absolute; left: 20px; top: 120px; width: 200px; 
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px;
            max-height: 60vh; overflow-y: auto; border: 1px solid #333;
        }

        #bottom-bar {
            width: 100%; height: 140px; background: rgba(10,10,10,0.9); 
            border-top: 1px solid #222; display: flex; 
            justify-content: center; align-items: center; gap: 20px; z-index: 10;
        }

        button { 
            padding: 18px 30px; border: 1px solid #444; background: #1a1a1a; 
            color: white; cursor: pointer; font-weight: bold; border-radius: 6px;
            text-transform: uppercase; transition: 0.2s;
        }
        button:hover { background: #222; border-color: #888; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        
        /* ANIMATIONS */
        @keyframes rollIn { 0% { transform: scale(0); opacity: 0; filter: blur(20px); } 100% { transform: scale(1); opacity: 1; filter: blur(0); } }
        @keyframes flashAnim { 0% { opacity: 1; } 100% { opacity: 0; } }
        .shake { animation: shakeAnim 0.05s infinite; }
        @keyframes shakeAnim { 0% { transform: translate(4px, 4px); } 50% { transform: translate(-4px, -4px); } 100% { transform: translate(0,0); } }
    </style>
</head>
<body>

    <canvas id="vfx-canvas"></canvas>

    <div id="cutscene">
        <div id="cutscene-flash"></div>
        <div id="cutscene-name">LEGENDARY</div>
    </div>

    <div class="top-stats">
        ROLLS: <span id="stat-rolls">0</span><br>
        LUCK: <span id="stat-luck">1.0</span>x
    </div>

    <div id="inventory">
        <b style="letter-spacing: 2px;">COLLECTION</b><hr style="border: 0.5px solid #333; margin: 10px 0;">
        <div id="inv-list"></div>
    </div>

    <div id="viewport">
        <div id="aura-name">NONE</div>
        <div id="aura-rarity">1/0</div>
    </div>

    <div id="bottom-bar">
        <button onclick="roll()" style="background: linear-gradient(#333, #111); width: 120px; font-size: 1.2rem;">ROLL</button>
        <button id="btn-auto" onclick="toggleAuto()">AUTO: OFF</button>
        <button onclick="craftLuck()">CRAFT LUCK (100)</button>
        <button onclick="resetGame()" style="color: #ff4444; font-size: 0.7rem; border-color: #400;">RESET</button>
    </div>

    <script>
        const canvas = document.getElementById('vfx-canvas');
        const ctx = canvas.getContext('2d');
        let rolls = 0, luck = 1.0, inventory = ["Common"], isRolling = false, autoOn = false;
        let activeAura = "Common";

        const data = {
            "Common": { color: "#ffffff", chance: 2, particles: 0, rings: 0 },
            "Uncommon": { color: "#4caf50", chance: 5, particles: 10, rings: 0 },
            "Rare": { color: "#2196f3", chance: 25, particles: 25, rings: 1 },
            "Epic": { color: "#9c27b0", chance: 125, particles: 40, rings: 1 },
            "Legendary": { color: "#ffeb3b", chance: 1000, particles: 80, rings: 2, cutscene: true },
            "Mythic": { color: "#ff5722", chance: 15000, particles: 150, rings: 3, cutscene: true },
            "Celestial": { color: "#00ffff", chance: 100000, particles: 300, rings: 5, cutscene: true }
        };

        // --- VFX ENGINE ---
        let particles = [];
        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        function createParticles() {
            const config = data[activeAura];
            if (particles.length < config.particles) {
                particles.push({
                    x: canvas.width/2, y: canvas.height/2,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    size: Math.random() * 4,
                    life: 1
                });
            }
        }

        function drawVFX() {
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.fillRect(0,0,canvas.width, canvas.height);
            const config = data[activeAura];
            const time = Date.now() * 0.002;

            // Draw Rings
            for(let i=0; i < config.rings; i++) {
                ctx.beginPath();
                ctx.strokeStyle = config.color;
                ctx.lineWidth = 2;
                ctx.arc(canvas.width/2, canvas.height/2, 150 + (i*40) + Math.sin(time)*10, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.beginPath(); // Orbiting bits
                let ox = canvas.width/2 + Math.cos(time * (i+1)) * (150 + (i*40));
                let oy = canvas.height/2 + Math.sin(time * (i+1)) * (150 + (i*40));
                ctx.fillStyle = config.color;
                ctx.arc(ox, oy, 8, 0, Math.PI * 2);
                ctx.fill();
            }

            // Draw Particles
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.01;
                ctx.fillStyle = config.color;
                ctx.globalAlpha = p.life;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                if(p.life <= 0) particles.splice(i, 1);
            });
            ctx.globalAlpha = 1;
            
            if(config.particles > 0) createParticles();
            requestAnimationFrame(drawVFX);
        }

        // --- GAME LOGIC ---
        function saveGame() {
            localStorage.setItem('solsRngSave_v2', JSON.stringify({rolls, luck, inventory}));
        }

        function loadGame() {
            const saved = JSON.parse(localStorage.getItem('solsRngSave_v2') || 'null');
            if (saved) {
                rolls = saved.rolls; luck = saved.luck; inventory = saved.inventory;
                document.getElementById('stat-rolls').innerText = rolls;
                document.getElementById('stat-luck').innerText = luck.toFixed(1);
                updateInventoryUI();
            }
        }

        function roll() {
            if (isRolling) return;
            rolls++;
            document.getElementById('stat-rolls').innerText = rolls;
            let rolled = "Common";
            const keys = Object.keys(data).reverse();
            for (let key of keys) {
                if (Math.random() < (1 / (data[key].chance / luck))) { rolled = key; break; }
            }
            if (!inventory.includes(rolled)) { inventory.push(rolled); updateInventoryUI(); }
            saveGame();
            if (data[rolled].cutscene) triggerCutscene(rolled);
            else displayRoll(rolled);
        }

        function triggerCutscene(name) {
            isRolling = true;
            const cs = document.getElementById('cutscene');
            const txt = document.getElementById('cutscene-name');
            document.documentElement.style.setProperty('--aura-color', data[name].color);
            
            cs.style.display = 'flex';
            txt.innerText = name;
            txt.style.color = data[name].color;
            document.getElementById('cutscene-flash').style.animation = "flashAnim 0.5s forwards";
            txt.style.animation = "rollIn 0.8s cubic-bezier(0.17, 0.89, 0.32, 1.49) forwards";
            document.body.classList.add('shake');

            setTimeout(() => {
                cs.style.display = 'none';
                document.body.classList.remove('shake');
                isRolling = false;
                equip(name);
            }, 3000);
        }

        function displayRoll(name) {
            document.getElementById('aura-rarity').innerText = `1/${data[name].chance}`;
            if(data[name].chance >= 1000) equip(name);
        }

        function equip(name) {
            activeAura = name;
            const aura = data[name];
            document.getElementById('aura-name').innerText = name;
            document.getElementById('aura-rarity').innerText = `1/${aura.chance}`;
            document.documentElement.style.setProperty('--aura-color', aura.color);
            particles = []; // Clear old particles
        }

        function updateInventoryUI() {
            const list = document.getElementById('inv-list');
            list.innerHTML = "";
            inventory.sort((a,b) => data[b].chance - data[a].chance).forEach(item => {
                const btn = document.createElement('button');
                btn.innerText = item;
                btn.style.width = "100%"; btn.style.marginBottom = "8px";
                btn.style.color = data[item].color; btn.style.fontSize = "0.75rem";
                btn.onclick = () => equip(item);
                list.appendChild(btn);
            });
        }

        function toggleAuto() {
            autoOn = !autoOn;
            document.getElementById('btn-auto').innerText = `AUTO: ${autoOn ? "ON" : "OFF"}`;
            if(autoOn) autoInterval = setInterval(() => { if(!isRolling) roll(); }, 500);
            else clearInterval(autoInterval);
        }

        function craftLuck() {
            if (rolls >= 100) {
                rolls -= 100; luck += 0.2;
                document.getElementById('stat-rolls').innerText = rolls;
                document.getElementById('stat-luck').innerText = luck.toFixed(1);
                saveGame();
            }
        }

        function resetGame() { if(confirm("Reset everything?")) { localStorage.clear(); location.reload(); } }

        loadGame();
        equip("Common");
        drawVFX();
    </script>
</body>
</html>
