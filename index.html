<div id="game-container">
    <div id="sidebar">
        <h2 style="color: #ffd700; border-bottom: 2px solid #333; padding-bottom: 10px;">RNG COSMOS</h2>
        
        <div class="stat-box">
            <div id="stat-rolls" class="stat">Rolls: 0</div>
            <div id="stat-luck" class="stat">Luck: 1.0x</div>
        </div>
        
        <button id="btn-roll" onclick="roll()">MANUAL ROLL</button>
        <button id="btn-auto" onclick="toggleAuto()">AUTO: OFF</button>

        <h3 style="margin-top:25px;">UPGRADES</h3>
        <!-- Separated luck and speed upgrades -->
        <button id="btn-luck" class="upgrade-btn" onclick="craftLuck()">
            +0.5 Luck (Cost: 25)
        </button>
        <button id="btn-speed" class="upgrade-btn" style="background:#2196f3; color:white;" onclick="buySpeed()">
            +1 Roll/Sec (Cost: 50)
        </button>

        <h3 style="margin-top:25px;">INVENTORY</h3>
        <div id="inventory-list" class="inv-scroll">Common</div>
        
        <button onclick="resetGame()" style="margin-top:20px; background:#442222; font-size:0.7rem;">WIPE DATA</button>
    </div>

    <div id="main-display">
        <div id="vfx-container"></div>
        <div id="aura-view">
            <h1 id="disp-name">READY?</h1>
            <div id="disp-rarity">Click Roll to Start</div>
        </div>
    </div>
</div>

<script>
// --- CORE GAME DATA ---
let rolls = 0;
let luck = 1.0;
let rollsPerSec = 0;
let inventory = ["Common"];
let isRolling = false;
let autoOn = false;
let autoInt = null;

const data = {
    Common: { color: "#888", chance: 2, vfx: 0 },
    Uncommon: { color: "#4caf50", chance: 8, vfx: 1 },
    Rare: { color: "#2196f3", chance: 32, vfx: 3 },
    Gilded: { color: "#ffd700", chance: 512, vfx: 8 },
    Legendary: { color: "#ffeb3b", chance: 2048, vfx: 15, cs: "✦" },
    Celestial: { color: "#00ffff", chance: 350000, vfx: 25, cs: "✦" },
    Arcane: { color: "#9c27b0", chance: 1000000, vfx: 40, cs: "✧" },
    Chromatic: { color: "#ff00ff", chance: 20000000, vfx: 60, cs: "✧" },
    Transcendent: { color: "#ff2e63", chance: 100000000, vfx: 100, cs: "❂" }
};

// --- SYSTEM FUNCTIONS ---
function formatRarity(num) {
    if (num >= 1e9) return (num / 1e9).toFixed(1) + "B";
    if (num >= 1e6) return (num / 1e6).toFixed(1) + "M";
    if (num >= 1e3) return (num / 1e3).toFixed(1) + "K";
    return num;
}

function updateUI() {
    document.getElementById("stat-rolls").innerText = `Rolls: ${Math.floor(rolls)}`;
    document.getElementById("stat-luck").innerText = `Luck: ${luck.toFixed(1)}x`;
    
    // Update button costs dynamically
    const luckCost = Math.floor(25 + (luck * 25));
    const speedCost = Math.floor(50 + (rollsPerSec * 75));
    document.getElementById("btn-luck").innerText = `+0.5 Luck (Cost: ${luckCost})`;
    document.getElementById("btn-speed").innerText = `+1 Roll/Sec (Cost: ${speedCost})`;

    document.getElementById("inventory-list").innerHTML = inventory.map(i => 
        `<div style="color:${data[i].color}; margin-bottom:4px;">1/${formatRarity(data[i].chance)} - ${i}</div>`
    ).join("");
    
    saveGame(); // Silent save on every UI update
}

// --- GAMEPLAY MECHANICS ---
function roll() {
    if (isRolling) return;
    isRolling = true;
    rolls++;

    let rollVal = "Common";
    const tiers = Object.keys(data).reverse();
    for (let t of tiers) {
        if (Math.random() < ((luck * 1.5) / data[t].chance)) {
            rollVal = t;
            break;
        }
    }

    if (!inventory.includes(rollVal)) inventory.push(rollVal);

    setTimeout(() => {
        if (data[rollVal].cs) triggerCutscene(rollVal);
        else displayAura(rollVal);
        isRolling = false;
    }, 50); 
}

function buySpeed() {
    const cost = Math.floor(50 + (rollsPerSec * 75));
    if (rolls >= cost) {
        rolls -= cost;
        rollsPerSec += 1;
        updateUI();
    }
}

// PASSIVE INCOME LOOP
setInterval(() => {
    if (rollsPerSec > 0) {
        rolls += rollsPerSec / 10; // Adds portion every 100ms for smoothness
        updateUI();
    }
}, 100);

// --- PERSISTENCE ---
function saveGame() {
    const gameState = { rolls, luck, rollsPerSec, inventory };
    localStorage.setItem("rng_cosmos_save", JSON.stringify(gameState));
}

function loadGame() {
    const saved = localStorage.getItem("rng_cosmos_save");
    if (saved) {
        const state = JSON.parse(saved);
        rolls = state.rolls || 0;
        luck = state.luck || 1.0;
        rollsPerSec = state.rollsPerSec || 0;
        inventory = state.inventory || ["Common"];
        updateUI();
    }
}

function resetGame() {
    if(confirm("Wipe all progress?")) {
        localStorage.removeItem("rng_cosmos_save");
        location.reload();
    }
}

window.onload = loadGame;
</script>
