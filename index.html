<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supercharged RNG Simulator</title>
    <style>
        :root { --aura-color: #888; }
        body { margin: 0; background: #111; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* Main Layout */
        #game-container { display: flex; height: 100vh; }
        #sidebar { width: 280px; background: #1a1a1a; padding: 20px; border-right: 2px solid #333; overflow-y: auto; }
        #main-display { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        /* Stats & Buttons */
        .stat { font-size: 1.2rem; margin-bottom: 10px; font-weight: bold; }
        button { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        #btn-roll { background: #444; color: white; font-size: 1.5rem; }
        #btn-auto { background: #222; color: #4caf50; border: 1px solid #4caf50; }
        #btn-craft { background: #ffd700; color: #000; }

        /* Display Area */
        #aura-view { text-align: center; z-index: 10; }
        #disp-name { font-size: 4rem; text-transform: uppercase; text-shadow: 0 0 20px var(--aura-color); margin: 0; }
        #disp-rarity { font-size: 1.5rem; color: #aaa; margin-top: 10px; }

        /* Cutscene Overlay */
        #cutscene { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); display: none; /* Flex via JS */
            flex-direction: column; align-items: center; justify-content: center; z-index: 100; 
        }
        #cs-star { font-size: 8rem; opacity: 0; }
        #cs-name { font-size: 3rem; opacity: 0; margin-top: 20px; }

        /* Animations */
        @keyframes starPop {
            0% { transform: scale(0) rotate(-45deg); opacity: 0; }
            70% { transform: scale(1.4) rotate(10deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        @keyframes reveal {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* VFX Particles */
        #vfx-container { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        .particle { position: absolute; background: var(--aura-color); border-radius: 50%; opacity: 0.6; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="sidebar">
        <h2>STATS</h2>
        <div id="stat-rolls" class="stat">Rolls: 0</div>
        <div id="stat-luck" class="stat">Luck: 1.0x</div>
        
        <button id="btn-roll" onclick="roll()">ROLL</button>
        <button id="btn-auto" onclick="toggleAuto()">AUTO: OFF</button>
        <button id="btn-craft" onclick="craftLuck()">UPGRADE LUCK</button>

        <hr style="border:1px solid #333; margin:20px 0;">
        <h3>INVENTORY</h3>
        <div id="inventory-list" style="font-size: 0.9rem; line-height: 1.6;">Common</div>
    </div>

    <div id="main-display">
        <div id="vfx-container"></div>
        <div id="aura-view">
            <h1 id="disp-name">Common</h1>
            <div id="disp-rarity">1 / 2</div>
        </div>
    </div>
</div>

<!-- Cutscene Layer -->
<div id="cutscene">
    <div id="cs-star">✦</div>
    <div id="cs-name">LEGENDARY</div>
</div>

<script>
    // Paste your logic here. 
    // Ensure you add the "updateUI()" function to keep the sidebar synced!
    
    function updateUI() {
        document.getElementById("stat-rolls").innerText = `Rolls: ${rolls}`;
        document.getElementById("stat-luck").innerText = `Luck: ${luck.toFixed(1)}x`;
        document.getElementById("inventory-list").innerHTML = inventory.map(i => 
            `<span style="color:${data[i].color}">${i}</span>`
        ).join(", ");
    }

    function createVFX(count) {
        const container = document.getElementById("vfx-container");
        container.innerHTML = ""; // Clear old particles
        for(let i=0; i<count * 5; i++) {
            const p = document.createElement("div");
            p.className = "particle";
            const size = Math.random() * 5 + 2;
            p.style.width = p.style.height = size + "px";
            p.style.left = Math.random() * 100 + "%";
            p.style.top = Math.random() * 100 + "%";
            container.appendChild(p);
        }
    }
</script>

</body>
</html>
