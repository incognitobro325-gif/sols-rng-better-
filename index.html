<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SOL'S RNG: ULTIMATE EDITION</title>
    <style>
        :root { --aura-color: #fff; --speed: 3s; }
        body { 
            background: #000; color: white; font-family: 'Segoe UI', sans-serif; 
            margin: 0; height: 100vh; overflow: hidden; 
            display: flex; flex-direction: column; align-items: center;
        }

        /* AURA VFX LAYER */
        #aura-container { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; 
            pointer-events: none; z-index: 1; 
        }
        .orbital { 
            position: absolute; border: 2px solid var(--aura-color); 
            border-radius: 50%; animation: spin var(--speed) linear infinite; 
            opacity: 0.5; box-shadow: 0 0 15px var(--aura-color);
        }
        .pulse { 
            position: absolute; width: 400px; height: 400px; border-radius: 50%; 
            background: radial-gradient(circle, var(--aura-color) 0%, transparent 70%); 
            animation: pulseAnim 2s infinite ease-in-out; opacity: 0.2; 
        }

        /* CUTSCENE OVERLAYS */
        #cutscene { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: #000; z-index: 2000; display: none; 
            flex-direction: column; justify-content: center; align-items: center; 
        }
        #cs-star { font-size: 15rem; color: var(--aura-color); text-shadow: 0 0 50px var(--aura-color); opacity: 0; }
        #cs-name { font-size: 6rem; font-weight: 900; margin-top: 20px; opacity: 0; text-transform: uppercase; }
        #shatter { position: absolute; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; }

        /* UI ELEMENTS */
        .top-stats { position: absolute; top: 20px; left: 20px; font-family: monospace; font-size: 1.2rem; z-index: 10; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; }
        
        #inventory { 
            position: absolute; left: 20px; top: 120px; width: 200px; 
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; 
            max-height: 60vh; overflow-y: auto; border: 1px solid #333; z-index: 10; 
        }

        /* FLOATING BOTTOM ROLL UI */
        #roll-ui {
            position: absolute; bottom: 30px; display: flex; align-items: center;
            gap: 15px; background: rgba(20, 20, 20, 0.9); padding: 20px 40px;
            border-radius: 50px; border: 2px solid #444; z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn-main { 
            padding: 15px 40px; font-size: 1.5rem; background: #fff; color: #000; 
            border: none; border-radius: 30px; cursor: pointer; font-weight: 900;
            transition: 0.2s;
        }
        .btn-main:hover { transform: scale(1.1); background: #eee; }
        .btn-side { 
            padding: 10px 20px; background: #222; color: #fff; 
            border: 1px solid #444; border-radius: 20px; cursor: pointer; font-weight: bold;
        }
        .btn-side:hover { background: #333; }

        /* KEY STYLES */
        #disp-name { font-size: 5rem; font-weight: 900; margin: 0; text-shadow: 0 0 30px var(--aura-color); }
        #disp-rarity { font-size: 1.8rem; opacity: 0.6; margin-top: 5px; }

        /* ANIMATIONS */
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulseAnim { 0%, 100% { transform: scale(0.8); opacity: 0.1; } 50% { transform: scale(1.2); opacity: 0.3; } }
        @keyframes starPop { 0% { transform: scale(0); opacity: 0; } 70% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes reveal { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes flash { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="cutscene">
        <div id="shatter"></div>
        <div id="cs-star">✦</div>
        <div id="cs-name">AURA NAME</div>
    </div>

    <div id="aura-container"></div>

    <div class="top-stats">
        ROLLS: <span id="stat-rolls">0</span><br>
        LUCK: <span id="stat-luck">1.0</span>x
    </div>

    <div id="inventory">
        <b style="letter-spacing: 2px;">STORAGE</b><hr style="border: 0; border-top: 1px solid #333; margin: 10px 0;">
        <div id="inv-list"></div>
    </div>

    <div style="z-index: 5; text-align: center; margin-top: 15vh;">
        <h1 id="disp-name">NONE</h1>
        <p id="disp-rarity">Click Roll to start</p>
    </div>

    <!-- MAIN ROLL UI -->
    <div id="roll-ui">
        <button class="btn-side" onclick="craftLuck()">CRAFT LUCK</button>
        <button class="btn-main" onclick="roll()">ROLL</button>
        <button id="btn-auto" class="btn-side" onclick="toggleAuto()">AUTO: OFF</button>
    </div>

    <script>
        let rolls = 0, luck = 1.0, inventory = ["Common"], isRolling = false, autoOn = false;

        const data = {
            "Common": { color: "#888", chance: 2, vfx: 0 },
            "Uncommon": { color: "#4caf50", chance: 8, vfx: 1 },
            "Rare": { color: "#2196f3", chance: 32, vfx: 1 },
            "Gilded": { color: "#ffd700", chance: 512, vfx: 2 },
            "Legendary": { color: "#ffeb3b", chance: 2048, vfx: 3, cs: "star4" },
            "Celestial": { color: "#00ffff", chance: 350000, vfx: 4, cs: "star8" },
            "Arcane": { color: "#9c27b0", chance: 1000000, vfx: 5, cs: "shatter" },
            "Chromatic": { color: "#ff00ff", chance: 20000000, vfx: 6, cs: "shatter" }
        };

        function saveGame() { localStorage.setItem('solsRngData_v2', JSON.stringify({rolls, luck, inventory})); }
        function loadGame() {
            const saved = JSON.parse(localStorage.getItem('solsRngData_v2'));
            if (saved) { rolls = saved.rolls; luck = saved.luck; inventory = saved.inventory; }
            updateUI();
        }

        function roll() {
            if (isRolling) return;
            rolls++;
            let rollVal = "Common";
            const tiers = Object.keys(data).reverse();
            for (let t of tiers) {
                if (Math.random() < (1 / (data[t].chance / luck))) { rollVal = t; break; }
            }
            if (!inventory.includes(rollVal)) inventory.push(rollVal);
            saveGame();
            if (data[rollVal].cs) triggerCutscene(rollVal); else displayAura(rollVal);
        }

        function triggerCutscene(name) {
            isRolling = true;
            const cs = document.getElementById('cutscene'), star = document.getElementById('cs-star'), 
                  txt = document.getElementById('cs-name'), sh = document.getElementById('shatter'), aura = data[name];
            
            cs.style.display = 'flex';
            document.documentElement.style.setProperty('--aura-color', aura.color);
            star.innerText = (aura.cs === "star8" || aura.cs === "shatter") ? "✷" : "✦";
            star.style.animation = "starPop 0.6s forwards";
            star.style.opacity = "1";
            
            if (aura.cs === "shatter") {
                setTimeout(() => { sh.style.animation = "flash 0.1s 4"; }, 800);
            }

            setTimeout(() => { 
                txt.innerText = name; 
                txt.style.color = aura.color;
                txt.style.animation = "reveal 0.5s forwards";
                txt.style.opacity = "1";
            }, 1200);

            setTimeout(() => { 
                cs.style.display = 'none'; 
                star.style.opacity = "0"; star.style.animation = "";
                txt.style.opacity = "0"; txt.style.animation = "";
                isRolling = false; displayAura(name); 
            }, 3500);
        }

        function displayAura(name) {
            const aura = data[name];
            const nameEl = document.getElementById('disp-name');
            nameEl.innerText = name;
            nameEl.style.color = aura.color;
            document.getElementById('disp-rarity').innerText = `1 / ${aura.chance.toLocaleString()}`;
            document.documentElement.style.setProperty('--aura-color', aura.color);
            createVFX(aura.vfx);
            updateUI();
        }

        function createVFX(level) {
            const container = document.getElementById('aura-container');
            container.innerHTML = '<div class="pulse"></div>';
            for (let i = 0; i < level; i++) {
                const orb = document.createElement('div');
                orb.className = 'orbital';
                const size = 250 + (i * 70);
                orb.style.width = size + 'px';
                orb.style.height = size + 'px';
                orb.style.animationDuration = (5 - (i * 0.7)) + 's';
                orb.style.borderWidth = (1 + i) + 'px';
                container.appendChild(orb);
            }
        }

        function updateUI() {
            document.getElementById('stat-rolls').innerText = rolls.toLocaleString();
            document.getElementById('stat-luck').innerText = luck.toFixed(1);
            const list = document.getElementById('inv-list');
            list.innerHTML = "";
            inventory.sort((a,b) => data[b].chance - data[a].chance).forEach(item => {
                const btn = document.createElement('button');
                btn.innerText = item;
                btn.style.cssText = `width:100%; margin-bottom:8px; padding:10px; background:#1a1a1a; border:1px solid #333; border-radius:5px; cursor:pointer; font-weight:bold; color:${data[item].color};`;
                btn.onclick = () => displayAura(item);
                list.appendChild(btn);
            });
        }

        function toggleAuto() {
            autoOn = !autoOn;
            document.getElementById('btn-auto').innerText = `AUTO: ${autoOn ? "ON" : "OFF"}`;
            document.getElementById('btn-auto').style.background = autoOn ? "#2e4d2e" : "#222";
            if(autoOn) autoInt = setInterval(() => { if(!isRolling) roll(); }, 1000);
            else clearInterval(autoInt);
        }

        function craftLuck() {
            if (rolls >= 100) {
                rolls -= 100;
                luck += 0.1;
                updateUI();
                saveGame();
            } else {
                alert("You need 100 rolls to upgrade luck!");
            }
        }

        function resetGame() { if(confirm("Wipe all data?")) { localStorage.clear(); location.reload(); } }

        loadGame();
        displayAura("Common");
    </script>
</body>
</html>
