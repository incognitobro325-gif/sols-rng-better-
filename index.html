<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SOL'S RNG: ULTIMATE EDITION</title>
    <style>
        :root { --aura-color: #fff; --secondary-color: #555; }
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; }

        /* AURA VFX LAYER */
        #aura-container { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; pointer-events: none; z-index: 1; }
        .orbital { position: absolute; border: 2px solid var(--aura-color); border-radius: 50%; animation: spin var(--speed) linear infinite; opacity: 0.6; }
        .pulse { position: absolute; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, var(--aura-color) 0%, transparent 70%); animation: pulseAnim 2s infinite ease-in-out; opacity: 0.3; }

        /* CUTSCENE OVERLAYS */
        #cutscene { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 1000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        #cs-star { font-size: 15rem; color: var(--aura-color); text-shadow: 0 0 50px var(--aura-color); opacity: 0; transition: 0.3s; }
        #cs-name { font-size: 6rem; font-weight: 900; margin-top: 20px; opacity: 0; }
        #shatter { position: absolute; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; }

        /* UI ELEMENTS */
        .top-stats { position: absolute; top: 20px; left: 20px; font-family: monospace; font-size: 1.2rem; z-index: 10; }
        #inventory { position: absolute; left: 20px; top: 100px; width: 180px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; max-height: 50vh; overflow-y: auto; border: 1px solid #444; z-index: 10; }
        #bottom-bar { width: 100%; height: 120px; background: #111; border-top: 2px solid #333; display: flex; justify-content: center; align-items: center; gap: 20px; z-index: 100; }
        button { padding: 15px 25px; border: 1px solid #555; background: #222; color: white; cursor: pointer; font-weight: bold; border-radius: 4px; transition: 0.2s; }
        button:hover { background: #444; border-color: #fff; transform: translateY(-2px); }

        /* ANIMATIONS */
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulseAnim { 0%, 100% { transform: scale(1); opacity: 0.2; } 50% { transform: scale(1.3); opacity: 0.5; } }
        @keyframes shake { 0% { transform: translate(0,0); } 25% { transform: translate(10px, -10px); } 50% { transform: translate(-10px, 10px); } 100% { transform: translate(0,0); } }
        @keyframes starPop { 0% { transform: scale(0); opacity: 0; } 70% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        .shatter-fx { animation: flash 0.1s 5; }
        @keyframes flash { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="cutscene">
        <div id="shatter"></div>
        <div id="cs-star">✦</div>
        <div id="cs-name">AURA NAME</div>
    </div>

    <div id="aura-container"></div>

    <div class="top-stats">
        ROLLS: <span id="stat-rolls">0</span><br>
        LUCK: <span id="stat-luck">1.0</span>x
    </div>

    <div id="inventory"><b>COLLECTION</b><hr><div id="inv-list"></div></div>

    <div style="z-index: 5; text-align: center;">
        <h1 id="disp-name" style="font-size: 4rem; margin-bottom: 0;">NONE</h1>
        <p id="disp-rarity" style="font-size: 1.5rem; opacity: 0.6;">Roll to begin...</p>
    </div>

    <div id="bottom-bar">
        <button onclick="roll()">ROLL</button>
        <button id="btn-auto" onclick="toggleAuto()">AUTO: OFF</button>
        <button onclick="craftLuck()">CRAFT LUCK (100 Rolls)</button>
        <button onclick="resetGame()" style="background: #411;">WIPE SAVE</button>
    </div>

    <script>
        let rolls = 0, luck = 1.0, inventory = ["Common"], isRolling = false, autoOn = false;

        const data = {
            "Common": { color: "#888", chance: 2, vfx: 0 },
            "Rare": { color: "#2196f3", chance: 16, vfx: 1 },
            "Gilded": { color: "#ffd700", chance: 512, vfx: 2 },
            "Legendary": { color: "#ffeb3b", chance: 1000, vfx: 3, cs: "star4" },
            "Celestial": { color: "#00ffff", chance: 350000, vfx: 4, cs: "star8" },
            "Arcane": { color: "#9c27b0", chance: 1000000, vfx: 5, cs: "shatter" },
            "Chromatic": { color: "#ff00ff", chance: 20000000, vfx: 6, cs: "shatter" }
        };

        function saveGame() { localStorage.setItem('solsRngData', JSON.stringify({rolls, luck, inventory})); }
        function loadGame() {
            const saved = JSON.parse(localStorage.getItem('solsRngData'));
            if (saved) { rolls = saved.rolls; luck = saved.luck; inventory = saved.inventory; }
            updateUI();
        }

        function roll() {
            if (isRolling) return;
            rolls++;
            let rollVal = "Common";
            const tiers = Object.keys(data).reverse();
            for (let t of tiers) {
                if (Math.random() < (1 / (data[t].chance / luck))) { rollVal = t; break; }
            }
            if (!inventory.includes(rollVal)) inventory.push(rollVal);
            saveGame();
            if (data[rollVal].cs) triggerCutscene(rollVal); else displayAura(rollVal);
        }

        function triggerCutscene(name) {
            isRolling = true;
            const cs = document.getElementById('cutscene'), star = document.getElementById('cs-star'), 
                  txt = document.getElementById('cs-name'), sh = document.getElementById('shatter'), aura = data[name];
            
            cs.style.display = 'flex';
            document.documentElement.style.setProperty('--aura-color', aura.color);
            star.innerText = aura.cs === "star8" || aura.cs === "shatter" ? "✷" : "✦";
            
            // Phase 1: The Boom
            setTimeout(() => { star.style.animation = "starPop 0.5s forwards"; star.style.opacity = "1"; }, 100);
            
            // Phase 2: Shatter for high tiers
            if (aura.cs === "shatter") {
                setTimeout(() => { sh.style.animation = "flash 0.1s 3"; document.body.style.animation = "shake 0.2s 5"; }, 800);
            }

            // Phase 3: Reveal
            setTimeout(() => { txt.innerText = name; txt.style.opacity = "1"; txt.style.color = aura.color; }, 1500);

            setTimeout(() => { cs.style.display = 'none'; star.style.opacity = "0"; txt.style.opacity = "0"; 
                document.body.style.animation = ""; isRolling = false; displayAura(name); }, 4000);
        }

        function displayAura(name) {
            const aura = data[name];
            document.getElementById('disp-name').innerText = name;
            document.getElementById('disp-name').style.color = aura.color;
            document.getElementById('disp-rarity').innerText = `1/${aura.chance.toLocaleString()}`;
            document.documentElement.style.setProperty('--aura-color', aura.color);
            createVFX(aura.vfx);
            updateUI();
        }

        function createVFX(level) {
            const container = document.getElementById('aura-container');
            container.innerHTML = '<div class="pulse"></div>';
            for (let i = 0; i < level; i++) {
                const orb = document.createElement('div');
                orb.className = 'orbital';
                const size = 200 + (i * 60);
                orb.style.width = size + 'px';
                orb.style.height = size + 'px';
                orb.style.animationDuration = (4 - (i * 0.5)) + 's';
                container.appendChild(orb);
            }
        }

        function updateUI() {
            document.getElementById('stat-rolls').innerText = rolls;
            document.getElementById('stat-luck').innerText = luck.toFixed(1);
            const list = document.getElementById('inv-list');
            list.innerHTML = "";
            inventory.forEach(item => {
                const btn = document.createElement('button');
                btn.innerText = item;
                btn.style.width = "100%"; btn.style.marginBottom = "5px"; btn.style.color = data[item].color;
                btn.onclick = () => displayAura(item);
                list.appendChild(btn);
            });
        }

        function toggleAuto() {
            autoOn = !autoOn;
            document.getElementById('btn-auto').innerText = `AUTO: ${autoOn ? "ON" : "OFF"}`;
            if(autoOn) autoInt = setInterval(() => { if(!isRolling) roll(); }, 1000);
            else clearInterval(autoInt);
        }

        function craftLuck() { if (rolls >= 100) { rolls -= 100; luck += 0.2; updateUI(); saveGame(); } }
        function resetGame() { if(confirm("Delete all auras?")) { localStorage.clear(); location.reload(); } }

        loadGame();
        displayAura("Common");
    </script>
</body>
</html>
